spring:
  application:
    name: ai-agent-service
  config:
    import: "optional:configserver:http://config-server:8888"

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/
  instance:
    prefer-ip-address: false
    instance-id: ai-agent-service:8084
    hostname: ai-agent-service

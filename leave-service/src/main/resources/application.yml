spring:
  application:
    name: leave-service # The name registered inside the Eureka phonebook
  config:
    import: "optional:configserver:http://localhost:8888" # Pulls global database configs from config-server

server:
  port: 8083 # Claims port room 8083 for this container instance

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Service registration coordinate
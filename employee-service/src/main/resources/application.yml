spring:
  application:
    name: employee-service # The unique identity string our Config Server matches to locate settings
  config:
    import: "optional:configserver:http://config-server:8888" # Use Compose service name so containers reach the Config Server

server:
  port: 8081 # Locks this specific service container into room number 8081

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/ # Use Compose service name for Eureka

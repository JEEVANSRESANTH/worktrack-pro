spring:
  application:
    name: employee-service # The unique identity string our Config Server matches to locate settings
  config:
    import: "optional:configserver:http://localhost:8888" # Tells Spring Boot to fetch settings from port 8888 first

server:
  port: 8081 # Locks this specific service container into room number 8081

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # Registers this service automatically with Eureka once it finishes booting

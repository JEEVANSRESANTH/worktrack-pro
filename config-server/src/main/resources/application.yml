server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: file:///app/config-repo # 🔥 Changed to a clean internal container folder route
          default-label: main

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka/ # 🔥 Changed localhost to eureka-server
version: '3.8'

services:
  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    networks:
      - worktrack-network

  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    volumes:
      - D:/projects/worktrack-config-repo:/app/config-repo # Use Windows absolute path so Docker Desktop can mount the host folder. If this fails, try
      # - //d/projects/worktrack-config-repo:/app/config-repo or use a named volume and copy files at build time.
    networks:
      - worktrack-network
    depends_on:
      - eureka-server

  employee-service:
    build: ./employee-service
    container_name: employee-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/worktrack_db
      # 🔥 CRITICAL CREDENTIAL ENFORCEMENT:
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=aacini10**
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - worktrack-network
    depends_on:
      - eureka-server
      - config-server

  task-service:
    build: ./task-service
    container_name: task-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/worktrack_db
      # 🔥 CRITICAL CREDENTIAL ENFORCEMENT:
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=aacini10**
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - worktrack-network
    depends_on:
      - eureka-server
      - config-server

  leave-service:
    build: ./leave-service
    container_name: leave-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://host.docker.internal:5432/worktrack_db
      # 🔥 CRITICAL CREDENTIAL ENFORCEMENT:
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=aacini10**
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - worktrack-network
    depends_on:
      - eureka-server
      - config-server

  ai-agent-service:
    build: ./ai-agent-service
    container_name: ai-agent-service
    ports:
      - "8084:8084"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - BASE_EMPLOYEE_URL=http://employee-service:8081/api/employees
      - DIRECT_TASK_SERVICE_URL=http://task-service:8082/api/tasks
      - BASE_LEAVE_URL=http://leave-service:8083/api/leaves
    networks:
      - worktrack-network
    depends_on:
      - eureka-server
      - config-server

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_CLOUD_CONFIG_URI=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - worktrack-network
    depends_on:
      - eureka-server
      - config-server

networks:
  worktrack-network:
    driver: bridge